services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    volumes:
      - postgres-data:/var/lib/postgresql/data

  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: mission
      MYSQL_DATABASE: mission_app
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    volumes:
      - mysql-data:/var/lib/mysql
      - ./dev/mysql/init:/docker-entrypoint-initdb.d:ro

  control-plane:
    build:
      context: .
      dockerfile: Dockerfile.control-plane
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ENV: ${ENV}
      HTTP_PORT: "8080"
      LOG_LEVEL: ${LOG_LEVEL}
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable
    ports:
      - "${BACKEND_PORT}:8080"

  web:
    image: node:20-alpine
    working_dir: /app
    depends_on:
      control-plane:
        condition: service_started
    volumes:
      - ./web:/app
    command:
      - sh
      - -c
      - "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    ports:
      - "${FRONTEND_PORT}:5173"

volumes:
  postgres-data:
  mysql-data:
