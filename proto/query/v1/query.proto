syntax = "proto3";

package query.v1;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/bryanbaek/mission/gen/go/query/v1;queryv1";

// AskQuestionRequest carries a natural-language question from a tenant member.
// The control plane is responsible for resolving the tenant's approved
// semantic layer (falling back to draft or raw schema) and generating SQL.
message AskQuestionRequest {
  string tenant_id = 1;
  string question = 2;
}

// Row is one result row, mapped as column_name -> stringified value. Values
// are stringified on the server to keep the proto flat; the UI renders them
// verbatim. Null is represented as the absent key (reader must use
// `columns` as the authoritative order/membership).
message Row {
  map<string, string> values = 1;
}

// AttemptDebug surfaces every SQL attempt the pipeline made (up to two).
// `stage` is one of "generation", "validation", "execution".
message AttemptDebug {
  string sql = 1;
  string error = 2;
  string stage = 3;
}

message AskQuestionResponse {
  // SQL the LLM produced on the attempt that ultimately succeeded. Shown to
  // the user as-is for transparency.
  string sql_original = 1;
  // Post-sqlguard rewrite (LIMIT may be injected, comments stripped, etc).
  string sql_executed = 2;
  bool limit_injected = 3;
  repeated string columns = 4;
  repeated Row rows = 5;
  int64 row_count = 6;
  int64 elapsed_ms = 7;
  // Korean natural-language summary of the result set.
  string summary_ko = 8;
  // Non-fatal notices: "used draft semantic layer", "fell back to raw schema",
  // "results truncated to 1000 rows", etc.
  repeated string warnings = 9;
  // Attempts history, size 1 or 2. Included even on success so callers can
  // see the retry trace.
  repeated AttemptDebug attempts = 10;
  string query_run_id = 11;
}

enum QueryRunStatus {
  QUERY_RUN_STATUS_UNSPECIFIED = 0;
  QUERY_RUN_STATUS_RUNNING = 1;
  QUERY_RUN_STATUS_SUCCEEDED = 2;
  QUERY_RUN_STATUS_FAILED = 3;
}

enum QueryPromptContextSource {
  QUERY_PROMPT_CONTEXT_SOURCE_UNSPECIFIED = 0;
  QUERY_PROMPT_CONTEXT_SOURCE_APPROVED = 1;
  QUERY_PROMPT_CONTEXT_SOURCE_DRAFT = 2;
  QUERY_PROMPT_CONTEXT_SOURCE_RAW_SCHEMA = 3;
}

enum QueryFeedbackRating {
  QUERY_FEEDBACK_RATING_UNSPECIFIED = 0;
  QUERY_FEEDBACK_RATING_UP = 1;
  QUERY_FEEDBACK_RATING_DOWN = 2;
}

message QueryFeedback {
  string query_run_id = 1;
  QueryFeedbackRating rating = 2;
  string comment = 3;
  string corrected_sql = 4;
  google.protobuf.Timestamp created_at = 5;
  google.protobuf.Timestamp updated_at = 6;
}

enum ReviewQueueFilter {
  REVIEW_QUEUE_FILTER_UNSPECIFIED = 0;
  REVIEW_QUEUE_FILTER_OPEN = 1;
  REVIEW_QUEUE_FILTER_ALL_RECENT = 2;
}

message SubmitQueryFeedbackRequest {
  string tenant_id = 1;
  string query_run_id = 2;
  QueryFeedbackRating rating = 3;
  string comment = 4;
  string corrected_sql = 5;
}

message SubmitQueryFeedbackResponse {
  QueryFeedback feedback = 1;
}

message CanonicalQueryExample {
  string id = 1;
  string source_query_run_id = 2;
  string schema_version_id = 3;
  string question = 4;
  string sql = 5;
  string notes = 6;
  google.protobuf.Timestamp created_at = 7;
}

message CreateCanonicalQueryExampleRequest {
  string tenant_id = 1;
  string query_run_id = 2;
  string question = 3;
  string sql = 4;
  string notes = 5;
}

message CreateCanonicalQueryExampleResponse {
  CanonicalQueryExample example = 1;
}

message ListCanonicalQueryExamplesRequest {
  string tenant_id = 1;
}

message ListCanonicalQueryExamplesResponse {
  repeated CanonicalQueryExample examples = 1;
  bool viewer_can_manage = 2;
}

message ArchiveCanonicalQueryExampleRequest {
  string tenant_id = 1;
  string example_id = 2;
}

message ArchiveCanonicalQueryExampleResponse {}

message QueryRunHistoryItem {
  string id = 1;
  string question = 2;
  QueryRunStatus status = 3;
  QueryPromptContextSource prompt_context_source = 4;
  string sql_original = 5;
  string sql_executed = 6;
  int64 row_count = 7;
  int64 elapsed_ms = 8;
  string error_stage = 9;
  string error_message = 10;
  repeated string warnings = 11;
  repeated AttemptDebug attempts = 12;
  google.protobuf.Timestamp created_at = 13;
  google.protobuf.Timestamp completed_at = 14;
}

message QueryRunReviewItem {
  QueryRunHistoryItem run = 1;
  bool has_feedback = 2;
  QueryFeedback latest_feedback = 3;
  bool has_active_canonical_example = 4;
  google.protobuf.Timestamp reviewed_at = 5;
}

message ListMyQueryRunsRequest {
  string tenant_id = 1;
  int32 limit = 2;
}

message ListMyQueryRunsResponse {
  repeated QueryRunHistoryItem runs = 1;
}

message ListReviewQueueRequest {
  string tenant_id = 1;
  ReviewQueueFilter filter = 2;
  int32 limit = 3;
}

message ListReviewQueueResponse {
  repeated QueryRunReviewItem items = 1;
}

message MarkQueryRunReviewedRequest {
  string tenant_id = 1;
  string query_run_id = 2;
}

message MarkQueryRunReviewedResponse {
  string query_run_id = 1;
  google.protobuf.Timestamp reviewed_at = 2;
}

service QueryService {
  rpc AskQuestion(AskQuestionRequest) returns (AskQuestionResponse);
  rpc ListMyQueryRuns(ListMyQueryRunsRequest) returns (ListMyQueryRunsResponse);
  rpc ListReviewQueue(ListReviewQueueRequest) returns (ListReviewQueueResponse);
  rpc MarkQueryRunReviewed(MarkQueryRunReviewedRequest)
      returns (MarkQueryRunReviewedResponse);
  rpc SubmitQueryFeedback(SubmitQueryFeedbackRequest)
      returns (SubmitQueryFeedbackResponse);
  rpc CreateCanonicalQueryExample(CreateCanonicalQueryExampleRequest)
      returns (CreateCanonicalQueryExampleResponse);
  rpc ListCanonicalQueryExamples(ListCanonicalQueryExamplesRequest)
      returns (ListCanonicalQueryExamplesResponse);
  rpc ArchiveCanonicalQueryExample(ArchiveCanonicalQueryExampleRequest)
      returns (ArchiveCanonicalQueryExampleResponse);
}
