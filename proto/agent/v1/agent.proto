syntax = "proto3";

package agent.v1;

import "google/protobuf/struct.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/bryanbaek/mission/gen/go/agent/v1;agentv1";

message OpenCommandStreamRequest {
  string session_id = 1;
  string hostname = 2;
  string agent_version = 3;
  google.protobuf.Timestamp started_at = 4;
}

message HeartbeatRequest {
  string session_id = 1;
  google.protobuf.Timestamp sent_at = 2;
}

message HeartbeatResponse {}

message PingCommand {}

message ExecuteQueryCommand {
  string sql = 1;
}

message IntrospectSchemaCommand {}

message SchemaTable {
  string table_schema = 1;
  string table_name = 2;
  string table_type = 3;
  string table_comment = 4;
}

message SchemaColumn {
  string table_schema = 1;
  string table_name = 2;
  string column_name = 3;
  int32 ordinal_position = 4;
  string data_type = 5;
  string column_type = 6;
  bool is_nullable = 7;
  bool has_default = 8;
  string default_value = 9;
  string column_comment = 10;
}

message SchemaPrimaryKey {
  string table_schema = 1;
  string table_name = 2;
  string constraint_name = 3;
  string column_name = 4;
  int32 ordinal_position = 5;
}

message SchemaForeignKey {
  string table_schema = 1;
  string table_name = 2;
  string constraint_name = 3;
  string column_name = 4;
  int32 ordinal_position = 5;
  string referenced_table_schema = 6;
  string referenced_table_name = 7;
  string referenced_column_name = 8;
}

message SchemaBlob {
  string database_name = 1;
  repeated SchemaTable tables = 2;
  repeated SchemaColumn columns = 3;
  repeated SchemaPrimaryKey primary_keys = 4;
  repeated SchemaForeignKey foreign_keys = 5;
}

message ControlMessage {
  string session_id = 1;
  string command_id = 2;
  google.protobuf.Timestamp issued_at = 3;

  oneof payload {
    PingCommand ping = 10;
    ExecuteQueryCommand execute_query = 11;
    IntrospectSchemaCommand introspect_schema = 12;
  }
}

message PingResult {
  int64 round_trip_ms = 1;
}

message ExecuteQueryRow {
  map<string, google.protobuf.Value> values = 1;
}

enum ExecuteQueryErrorCode {
  EXECUTE_QUERY_ERROR_CODE_UNSPECIFIED = 0;
  EXECUTE_QUERY_ERROR_CODE_PERMISSION_DENIED = 1;
  EXECUTE_QUERY_ERROR_CODE_INTERNAL = 2;
}

message ExecuteQueryResult {
  repeated string columns = 1;
  repeated ExecuteQueryRow rows = 2;
  int64 elapsed_ms = 3;
  string database_user = 4;
  string database_name = 5;
  string error = 6;
  ExecuteQueryErrorCode error_code = 7;
  string error_reason = 8;
  repeated string blocked_constructs = 9;
}

message IntrospectSchemaResult {
  SchemaBlob schema = 1;
  int64 elapsed_ms = 2;
  string database_user = 3;
  string database_name = 4;
  string error = 5;
}

message SubmitCommandResultRequest {
  string session_id = 1;
  string command_id = 2;
  google.protobuf.Timestamp completed_at = 3;

  oneof result {
    PingResult ping = 10;
    ExecuteQueryResult execute_query = 11;
    IntrospectSchemaResult introspect_schema = 12;
  }
}

message SubmitCommandResultResponse {}

service AgentService {
  rpc OpenCommandStream(OpenCommandStreamRequest)
      returns (stream ControlMessage);
  rpc Heartbeat(HeartbeatRequest) returns (HeartbeatResponse);
  rpc SubmitCommandResult(SubmitCommandResultRequest)
      returns (SubmitCommandResultResponse);
}
